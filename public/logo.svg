<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="D'mba">
  <!--
    D'mba — the Baga (Guinea) shoulder mask / headdress after which the Nimba
    range is named: a crested head with a strong central ridge over a carrying
    plinth. Rendered as a sober, banking-appropriate emblem that stays legible
    down to favicon size. One master asset; export the .ico from this file.
  -->
  <defs>
    <linearGradient id="dmbaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F8A6E"/>
      <stop offset="1" stop-color="#0A5F52"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#dmbaBg)"/>
  <g fill="#F6ECD3">
    <!-- crest / comb -->
    <path d="M32 6 C 35.6 11.5 35.6 15.6 32 19.2 C 28.4 15.6 28.4 11.5 32 6 Z"/>
    <!-- head -->
    <circle cx="32" cy="27" r="9"/>
    <!-- central ridge (nose) bridging head to plinth -->
    <path d="M30.3 28 C 31.4 27.1 32.6 27.1 33.7 28 L 32.9 44 C 32.6 45.7 31.4 45.7 31.1 44 Z"/>
    <!-- plinth / shoulders -->
    <path d="M24 43.5 L40 43.5 Q42.1 43.5 42.7 45.6 L45.1 55 Q45.7 57.6 43 57.6 L21 57.6 Q18.3 57.6 18.9 55 L21.3 45.6 Q21.9 43.5 24 43.5 Z"/>
  </g>
  <!-- mask eyes -->
  <g fill="#0A5F52">
    <circle cx="28.3" cy="26" r="1.6"/>
    <circle cx="35.7" cy="26" r="1.6"/>
  </g>
</svg>
